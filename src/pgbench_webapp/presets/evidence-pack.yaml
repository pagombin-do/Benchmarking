# One-click IOPS evidence pack: the core four device probes as a single job
# (rndrd 16K, rndrd 8K, rndwr 16K, rndwr 16K replication — all O_DIRECT),
# emitting a consolidated storage-team narrative (pack_report.md) with fresh
# numbers: steady ceilings, block-size dependence, replication delta, burst
# check, and the volume's provisioning identity (StorageClass/PV/volume_id).
# Files are prepared once and reused across the four probes.
# TEST CLUSTERS ONLY — same guardrails as the device probe.
run:
  label: evidence-pack
  edition: advanced
  tshirt_size: 8c32g
target:                    # metadata for the bundle; the pack drives no SQL
  host: db.example.com
  port: 25060
  database: defaultdb
  user: doadmin
  password_env: PGB_TARGET_PASSWORD
workload:
  type: oltp_read_only
  tables: 16
  table_size: 1000000
cluster:
  cr_name: cluster1
  namespace: percona
device_probe:
  allow_device_probe: true
  pack: true               # <- the pack switch
  file_num: 128
  file_total_size_gb: 100
  io_mode: async
  async_backlog: 256
  threads: 128
  duration_s: 600          # per probe; total ~4x this + one prepare
  fsync_freq: 0
  # keep_files: true       # keep the files after the pack for more iteration
limits:
  standard_iops: 10000
  burst_iops: 15000
  target_iops: 40000
